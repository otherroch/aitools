[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "portrait-prep"
version = "0.1.0"
description = "Portrait dataset preparation toolkit for diffusion model LoRA training"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
keywords = ["diffusion", "lora", "dataset", "portrait", "augmentation", "captioning"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Multimedia :: Graphics",
]
dependencies = [
    "albumentations>=1.4.0",
    "opencv-python>=4.9.0",
    "Pillow>=10.0.0",
    "pillow-heif>=0.16.0",
    "face_recognition>=1.3.0",
    "numpy>=1.24.0",
    "tqdm>=4.66.0",
    "onnxruntime>=1.17.0",
    "huggingface_hub>=0.22.0",
]

[project.optional-dependencies]
gpu = ["onnxruntime-gpu>=1.17.0"]
dev = ["pytest>=8.0", "pytest-cov"]

[project.scripts]
portrait-prep = "portrait_prep.cli:main"

[project.urls]
Repository = "https://github.com/yourname/portrait-prep"

[tool.setuptools.packages.find]
where = ["."]
include = ["portrait_prep*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"

[tool.coverage.run]
source = ["portrait_prep"]
omit = ["tests/*"]
